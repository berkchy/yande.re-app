<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yande Mobile</title>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'FontStars';
      src: url('fonts/fontstars.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --primary: #a78bfa;
      --bg: #0f0f0f;
      --surface: #171717;
      --text: #e5e5e5;
      --text-sec: #9ca3af;
    }

    [data-theme="light"]    { --primary: #6d28d9; --bg: #f9fafb; --surface: #fff; --text: #111827; --text-sec: #6b7280; }
    [data-theme="purple"]   { --primary: #c084fc; --bg: #2e1065; --surface: #4c1d95; --text: #f3e8ff; --text-sec: #c4b5fd; }
    [data-theme="indigo"]   { --primary: #818cf8; --bg: #1e1b4b; --surface: #312e81; --text: #e0e7ff; --text-sec: #a5b4fc; }
    [data-theme="cyan"]     { --primary: #22d3ee; --bg: #0e7490; --surface: #164e63; --text: #cffafe; --text-sec: #67e8f9; }
    [data-theme="emerald"]  { --primary: #34d399; --bg: #064e3b; --surface: #065f46; --text: #d1fae5; --text-sec: #6ee7b7; }
    [data-theme="amber"]    { --primary: #fbbf24; --bg: #451a03; --surface: #78350f; --text: #fef3c7; --text-sec: #fcd34d; }
    [data-theme="rose"]     { --primary: #fb7185; --bg: #500724; --surface: #881337; --text: #fce7f3; --text-sec: #f9a8d4; }
    [data-theme="violet"]   { --primary: #c084fc; --bg: #3b0764; --surface: #581c87; --text: #f3e8ff; --text-sec: #d8b4fe; }
    [data-theme="slate"]    { --primary: #94a3b8; --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; --text-sec: #94a3b8; }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    #topbar-title {
      font-family: 'FontStars', system-ui;
      font-weight: 100;
      font-size: 1.5rem;
      color: var(--primary);
    }

    header {
      position: fixed;
      top: 40px;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    #search {
      flex: 1;
      padding: 12px 16px;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid rgba(158,158,158,0.3);
      color: var(--text);
      font-size: 16px;
    }

    #search::placeholder {
      color: var(--text-sec);
    }

    .fab {
      width: 43px;
      height: 43px;
      border-radius: 50%;
      background: var(--primary);
      color: #000;
      display: grid;
      place-items: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      border: none;
      font-size: 22px;
      cursor: pointer;
    }

    main {
      flex: 1;
      padding: 100px 12px 90px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      will-change: transform;
      transform: translate3d(0,0,0);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform, opacity;
      transform: translate3d(0,0,0);
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 3/4;
      object-fit: cover;
    }

    .card-footer {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 10px;
    }

    .filename-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      height: 1.3em;
    }

    .filename {
      white-space: nowrap;
      position: absolute;
      left: 0;
      top: 0;
      font-size: 0.78rem;
      color: var(--text-sec);
      will-change: transform;
    }

    .dl-btn {
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 20px;
      transition: transform 0.18s ease;
    }

    .dl-btn:hover {
      transform: scale(1.15);
    }

    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #modal.show {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 28px;
      max-width: 94%;
      max-height: 90vh;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      transform: scale(0.82);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    #modal.show .modal-content {
      transform: scale(1);
      opacity: 1;
    }

    .modal-header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .modal-title {
      margin: 0;
      font-size: 1.25rem;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-sec);
      font-size: 32px;
      cursor: pointer;
    }

    .modal-body {
      padding: 12px;
      text-align: center;
      position: relative;
    }

    .modal-body img {
      max-width: 100%;
      max-height: 58vh;
      border-radius: 16px;
      object-fit: contain;
    }

    .modal-actions {
      padding: 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .btn {
      padding: 12px 32px;
      border-radius: 50px;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-close {
      background: #424242;
      color: white;
    }

    .btn-download {
      background: var(--primary);
      color: #000;
    }

    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 76px;
      background: var(--surface);
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 -3px 12px rgba(0,0,0,0.25);
      z-index: 100;
    }

    nav button {
      background: none;
      border: none;
      color: var(--text-sec);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      padding: 8px;
      transition: color 0.25s;
    }

    nav button.active,
    nav button:hover {
      color: var(--primary);
    }

    nav .material-icons {
      font-size: 28px;
    }

    #loading {
      text-align: center;
      padding: 80px 0;
      color: var(--primary);
      font-size: 1.5rem;
    }

    #theme-panel {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      background: var(--surface);
      padding: 12px 16px;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      gap: 12px;
      max-width: 90vw;
      overflow-x: auto;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
    }

    #theme-panel.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(-10px);
    }

    .color-swatch {
      flex: 0 0 36px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      transition: all 0.25s;
    }

    .color-swatch:hover,
    .color-swatch.active {
      border-color: var(--primary);
      transform: scale(1.18);
    }

    #hd-loader {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="topbar">
    <span id="topbar-title">Yandoor</span>
  </div>

  <header>
    <input id="search" placeholder="Search for tags..." autocomplete="off" />
    <button class="fab" id="btn-search">
      <span class="material-icons">search</span>
    </button>
  </header>

  <main>
    <div class="grid" id="grid"></div>
    <div id="loading">Yükleniyor...</div>
  </main>

  <nav>
    <button id="home-btn" class="active">
      <span class="material-icons">home</span>
      <span>Home</span>
    </button>
    <button id="toggle-nsfw">
      <span class="material-icons">visibility</span>
      <span>NSFW</span>
    </button>
    <button id="btn-theme">
      <span class="material-icons">palette</span>
      <span>Theme</span>
    </button>
  </nav>

  <div id="theme-panel">
    <div class="color-swatch" style="background:#111827;" data-theme="dark"></div>
    <div class="color-swatch" style="background:#f9fafb;" data-theme="light"></div>
    <div class="color-swatch" style="background:#7c3aed;" data-theme="purple"></div>
    <div class="color-swatch" style="background:#4f46e5;" data-theme="indigo"></div>
    <div class="color-swatch" style="background:#0891b2;" data-theme="cyan"></div>
    <div class="color-swatch" style="background:#059669;" data-theme="emerald"></div>
    <div class="color-swatch" style="background:#d97706;" data-theme="amber"></div>
    <div class="color-swatch" style="background:#e11d48;" data-theme="rose"></div>
    <div class="color-swatch" style="background:#8b5cf6;" data-theme="violet"></div>
    <div class="color-swatch" style="background:#475569;" data-theme="slate"></div>
  </div>

  <div id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">Preview</h3>
        <button class="close-btn"><span class="material-icons">close</span></button>
      </div>
      <div class="modal-body">
        <img id="big-img" src="" alt="" />
        <div id="hd-loader"><div class="loader"></div></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-download" id="btn-download">
          <span class="material-icons">download</span> İndir
        </button>
      </div>
    </div>
  </div>

<script>
// ────────────────────────────────────────────────
const html         = document.documentElement;
const grid         = document.getElementById("grid");
const loading      = document.getElementById("loading");
const searchInput  = document.getElementById("search");
const btnSearch    = document.getElementById("btn-search");
const toggleNSFW   = document.getElementById("toggle-nsfw");
const modal        = document.getElementById("modal");
const bigImg       = document.getElementById("big-img");
const btnDownload  = document.getElementById("btn-download");
const closeBtn     = modal.querySelector(".close-btn");

let page      = 1;
let isLoading = false;
let nsfw      = localStorage.getItem("nsfw") === "true";
let observer  = null;

// ─── Theme ──────────────────────────────────────
function setTheme(theme) {
  html.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
  document.querySelectorAll(".color-swatch").forEach(el => {
    el.classList.toggle("active", el.dataset.theme === theme);
  });
}

setTheme(localStorage.getItem("theme") || "dark");

// ─── Event Listeners ────────────────────────────
document.getElementById("btn-theme").onclick = e => {
  e.stopPropagation();
  document.getElementById("theme-panel").classList.toggle("open");
};

document.getElementById("theme-panel").onclick = e => {
  e.stopPropagation();
  if (e.target.classList.contains("color-swatch")) {
    setTheme(e.target.dataset.theme);
    document.getElementById("theme-panel").classList.remove("open");
  }
};

document.onclick = () => {
  document.getElementById("theme-panel").classList.remove("open");
};

toggleNSFW.classList.toggle("active", nsfw);
toggleNSFW.querySelector(".material-icons").textContent = nsfw ? "visibility_off" : "visibility";

toggleNSFW.onclick = () => {
  nsfw = !nsfw;
  localStorage.setItem("nsfw", nsfw);
  toggleNSFW.classList.toggle("active", nsfw);
  toggleNSFW.querySelector(".material-icons").textContent = nsfw ? "visibility_off" : "visibility";
  reset();
};

btnSearch.onclick = reset;
searchInput.onkeydown = e => { if (e.key === "Enter") { e.preventDefault(); reset(); } };
document.getElementById("home-btn").onclick = reset;
closeBtn.onclick = closeModal;
modal.onclick = e => { if (e.target === modal) closeModal(); };

// ─── Infinite Scroll (raf + passive) ────────────
let rafPending = false;
window.addEventListener("scroll", () => {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 600 && !isLoading) {
      load();
    }
  });
}, { passive: true });

// ─── Intersection Observer for cards ────────────
observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
      observer.unobserve(entry.target);
    }
  });
}, { rootMargin: "300px 0px" });

// ─── Core Functions ─────────────────────────────
function getTags() {
  let tags = searchInput.value.trim();
  if (tags) tags += " ";
  tags += "-ai -ai-generated";
  return tags.trim();
}

async function load() {
  if (isLoading) return;
  isLoading = true;
  loading.style.display = "block";

  const tags = getTags();
  const url = `/api/posts?page=\( {page}&tags=${encodeURIComponent(tags)}&_=${Date.now()}`;

  let posts;
  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error();
    posts = await res.json();
  } catch {
    loading.textContent = "Bağlantı hatası";
    isLoading = false;
    return;
  }

  if (!posts.length) {
    loading.textContent = "Daha fazla yok";
    isLoading = false;
    return;
  }

  posts.forEach(post => {
    if ((!nsfw && post.rating === "s") || (nsfw && post.rating !== "s")) {
      addPostCard(post);
    }
  });

  page++;
  isLoading = false;
  loading.style.display = "none";
}

function addPostCard(post) {
  const card = document.createElement("div");
  card.className = "card";

  const img = document.createElement("img");
  img.src = post.preview_url || "https://via.placeholder.com/140?text=?";
  img.loading = "lazy";
  img.alt = "";
  img.onclick = () => openModal(post);
  card.appendChild(img);

  const footer = document.createElement("div");
  footer.className = "card-footer";

  const wrapper = document.createElement("div");
  wrapper.className = "filename-wrapper";

  const filename = document.createElement("div");
  filename.className = "filename";

  const ext = (post.file_url.match(/\.(\w+)(\?|$)/)?.[1] || "jpg");
  const cleanTags = (post.tags || "").replace(/\s+/g, "_").slice(0, 48);
  const fileNameText = `yande_${post.id}_${cleanTags}.${ext}`;
  filename.textContent = fileNameText;

  wrapper.appendChild(filename);
  footer.appendChild(wrapper);

  const dlBtn = document.createElement("button");
  dlBtn.className = "dl-btn material-icons";
  dlBtn.textContent = "download";
  dlBtn.onclick = e => {
    e.stopPropagation();
    const a = document.createElement("a");
    a.href = `/api/view?url=${encodeURIComponent(post.file_url)}`;
    a.download = fileNameText;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };
  footer.appendChild(dlBtn);

  card.appendChild(footer);
  grid.appendChild(card);

  observer.observe(card);

  // basit marquee
  setTimeout(() => {
    const w = wrapper.offsetWidth;
    const t = filename.offsetWidth;
    if (t > w + 10) {
      let pos = 0;
      const step = () => {
        pos -= 0.4;
        if (-pos > t) pos = w;
        filename.style.transform = `translateX(${pos}px)`;
        requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }
  }, 300);
}

function reset() {
  page = 1;
  grid.innerHTML = "";
  window.scrollTo({ top: 0, behavior: "instant" });
  loading.style.display = "block";
  loading.textContent = "Yükleniyor...";
  load();
}

function openModal(post) {
  const hdUrl = post.sample_url || post.file_url;
  bigImg.src = post.preview_url || "";
  document.getElementById("hd-loader").style.display = "flex";

  const proxy = `/api/view?url=${encodeURIComponent(hdUrl)}`;
  const imgLoader = new Image();
  imgLoader.onload = () => {
    bigImg.src = proxy;
    document.getElementById("hd-loader").style.display = "none";
  };
  imgLoader.src = proxy;

  btnDownload.onclick = () => {
    const ext = (post.file_url.match(/\.(\w+)(\?|$)/)?.[1] || "jpg");
    const clean = (post.tags || "").replace(/\s+/g, "_").slice(0, 48);
    const fname = `yande_${post.id}_${clean}.${ext}`;

    const a = document.createElement("a");
    a.href = `/api/view?url=${encodeURIComponent(post.file_url)}`;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  modal.style.display = "flex";
  setTimeout(() => modal.classList.add("show"), 20);
}

function closeModal() {
  modal.classList.remove("show");
  setTimeout(() => {
    modal.style.display = "none";
    bigImg.src = "";
    document.getElementById("hd-loader").style.display = "none";
  }, 400);
}

// İlk yükleme
load();
</script>
</body>
</html>
