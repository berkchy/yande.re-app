<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Yande Mobile</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet">
  <style>
	@font-face{font-family:'FontStars';src:url('fonts/fontstars.otf') format('opentype');font-weight:normal;font-style:normal; }
    :root{--primary:#a78bfa;--bg:#0f0f0f;--surface:#171717;--text:#e5e5e5;--text-sec:#9ca3af}
    [data-theme="light"]{--primary:#6d28d9;--bg:#f9fafb;--surface:#fff;--text:#111827;--text-sec:#6b7280}
    [data-theme="purple"]{--primary:#c084fc;--bg:#2e1065;--surface:#4c1d95;--text:#f3e8ff;--text-sec:#c4b5fd}
    [data-theme="indigo"]{--primary:#818cf8;--bg:#1e1b4b;--surface:#312e81;--text:#e0e7ff;--text-sec:#a5b4fc}
    [data-theme="cyan"]{--primary:#22d3ee;--bg:#0e7490;--surface:#164e63;--text:#cffafe;--text-sec:#67e8f9}
    [data-theme="emerald"]{--primary:#34d399;--bg:#064e3b;--surface:#065f46;--text:#d1fae5;--text-sec:#6ee7b7}
    [data-theme="amber"]{--primary:#fbbf24;--bg:#451a03;--surface:#78350f;--text:#fef3c7;--text-sec:#fcd34d}
    [data-theme="rose"]{--primary:#fb7185;--bg:#500724;--surface:#881337;--text:#fce7f3;--text-sec:#f9a8d4}
    [data-theme="violet"]{--primary:#c084fc;--bg:#3b0764;--surface:#581c87;--text:#f3e8ff;--text-sec:#d8b4fe}
    [data-theme="slate"]{--primary:#94a3b8;--bg:#0f172a;--surface:#1e293b;--text:#e2e8f0;--text-sec:#94a3b8}
    body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    header{position:fixed;top:28px;;left:0;right:0;z-index:100;background:var(--surface);padding:12px 16px;display:flex;gap:12px;align-items:center;box-shadow:0 2px 12px rgba(0,0,0,.25)}
    #search{flex:1;padding:12px 16px;border-radius:30px;background:var(--surface);border:1px solid rgba(158,158,158,.3);color:var(--text);font-size:16px}
    #search::placeholder{color:var(--text-sec)}.fab{width:43px;height:43px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;box-shadow:0 3px 10px rgba(0,0,0,.3);border:none;font-size:22px}
    main{flex:1;padding:122px 12px 90px;;overflow-y:auto}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
    .card{background:var(--surface);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.2);cursor:pointer;opacity:0;transform:translateY(20px);transition:all .5s cubic-bezier(.34,1.56,.64,1)}
    .card.visible{opacity:1;transform:translateY(0)}.card:hover{transform:scale(1.04);box-shadow:0 12px 32px rgba(0,0,0,.35)}
    .card img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover}
    #modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:999;display:none;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .4s ease}
    #modal.show{opacity:1;display:flex}.modal-content{background:var(--surface);border-radius:28px;max-width:92%;max-height:88vh;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6);transform:scale(.85);opacity:0;transition:all .45s cubic-bezier(.34,1.56,.64,1)}
    #modal.show .modal-content{transform:scale(1);opacity:1}.modal-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08)}
    .modal-title{margin:0;font-size:1.2rem;font-weight:500}.close-btn{background:none;border:none;color:var(--text-sec);font-size:28px;cursor:pointer}
    .modal-body{padding:12px;text-align:center}.modal-body img{max-width:100%;max-height:55vh;border-radius:16px;object-fit:contain}
    .modal-actions{padding:20px;display:flex;gap:16px;justify-content:center}.btn{padding:12px 28px;border-radius:50px;border:none;font-size:1rem;font-weight:500;cursor:pointer}
    .btn-close{background:#424242;color:#fff}.btn-download{background:var(--primary);color:#000}
    nav{position:fixed;bottom:0;left:0;right:0;height:76px;background:var(--surface);display:flex;justify-content:space-around;align-items:center;box-shadow:0 -3px 12px rgba(0,0,0,.25);z-index:100}
    nav button{background:none;border:none;color:var(--text-sec);display:flex;flex-direction:column;align-items:center;gap:4px;font-size:.75rem;cursor:pointer;padding:8px;transition:color .3s}
    nav button.active,nav button:hover{color:var(--primary)}nav .material-icons{font-size:28px}
    #loading{font-family:'FontStars', sans-serif;font-weight: 100;text-align:center;padding:60px 0;color:var(--primary);font-size:1.4rem;/*animation:spin 4s linear infinite*/}@keyframes spin{to{transform:rotate(360deg)}}
    #theme-panel{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:150;background:var(--surface);padding:10px 12px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:flex;flex-wrap:nowrap;overflow-x:auto;gap:12px;max-width:90vw;justify-content:flex-start;opacity:0;pointer-events:none;transition:all .35s ease}
    #theme-panel.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(-12px)}
    .color-swatch{flex:0 0 32px;width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-shadow:0 3px 10px rgba(0,0,0,.3);transition:all .3s}
    .color-swatch:hover,.color-swatch.active{border-color:var(--primary);transform:scale(1.2)}
    #hd-loader{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:5;}
	.loader{width:48px;height:48px;border:4px solid rgba(255,255,255,0.25);border-top:4px solid white;border-radius:50%;animation:spin 1.8s linear infinite;}
	@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
	#topbar {position: fixed;top: 0;left: 0;right: 0;height: 40px;background: var(--surface);display: flex;align-items: center;justify-content: center;z-index: 200;}
	#topbar-title {font-family:'FontStars', sans-serif;font-weight: 100;font-size: 1.5rem;color: var(--primary);}
  </style>
</head>
<body>
<header>
  <div id="topbar">
    <span id="topbar-title">Yandoor</span>
  </div>
  <input id="search" placeholder="Search for tags..."/>
  <button class="fab" id="btn-search"><span class="material-icons">search</span></button>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div id="loading"><span class="material-icons">hourglass_empty</span></div>
</main>
<nav>
  <button id="home-btn" class="active"><span class="material-icons">home</span><span>Home</span></button>
  <button id="toggle-nsfw"><span class="material-icons">visibility</span><span>NSFW</span></button>
  <button id="btn-theme"><span class="material-icons">palette</span><span>Theme</span></button>
</nav>
<div id="theme-panel">
  <div class="color-swatch" style="background:#111827;" data-theme="dark"></div>
  <div class="color-swatch" style="background:#f9fafb;" data-theme="light"></div>
  <div class="color-swatch" style="background:#7c3aed;" data-theme="purple"></div>
  <div class="color-swatch" style="background:#4f46e5;" data-theme="indigo"></div>
  <div class="color-swatch" style="background:#0891b2;" data-theme="cyan"></div>
  <div class="color-swatch" style="background:#059669;" data-theme="emerald"></div>
  <div class="color-swatch" style="background:#d97706;" data-theme="amber"></div>
  <div class="color-swatch" style="background:#e11d48;" data-theme="rose"></div>
  <div class="color-swatch" style="background:#8b5cf6;" data-theme="violet"></div>
  <div class="color-swatch" style="background:#475569;" data-theme="slate"></div>
</div>
<div id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">Preview</h3>
      <button class="close-btn" onclick="closeModal()"><span class="material-icons">close</span></button>
    </div>
    <div class="modal-body">
      <img id="big-img" src="" alt=""/>
      <div id="hd-loader">
    	<div class="loader"></div>
	  </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-download" id="btn-download"><span class="material-icons">download</span></button>
    </div>
  </div>
</div>

<script>
let hdLoaderImg = null
const html = document.documentElement
const grid = document.getElementById("grid")
const loading = document.getElementById("loading")
const search = document.getElementById("search")
const btnSearch = document.getElementById("btn-search")
const toggleNSFW = document.getElementById("toggle-nsfw")
const modal = document.getElementById("modal")
const bigImg = document.getElementById("big-img")
const btnDownload = document.getElementById("btn-download")

let page = 1
let isLoading = false
let controller = null
let nsfw = localStorage.getItem("nsfw") === "true"

function setTheme(t) {
	html.setAttribute("data-theme", t)
	localStorage.setItem("theme", t)

	document.querySelectorAll(".color-swatch").forEach(e =>
		e.classList.toggle("active", e.dataset.theme === t)
	)
}

setTheme(localStorage.getItem("theme") || "dark")

document.getElementById("btn-theme").onclick = e => {
	e.stopPropagation()
	document.getElementById("theme-panel").classList.toggle("open")
}

document.getElementById("theme-panel").onclick = e => {
	e.stopPropagation()

	if (e.target.classList.contains("color-swatch")) {
		setTheme(e.target.dataset.theme)
		document.getElementById("theme-panel").classList.remove("open")
	}
}

document.onclick = e => {
	const p = document.getElementById("theme-panel")

	if (!p.contains(e.target) && !document.getElementById("btn-theme").contains(e.target))
		p.classList.remove("open")
}

toggleNSFW.classList.toggle("active", nsfw)
toggleNSFW.querySelector(".material-icons").textContent = nsfw ? "visibility_off" : "visibility"

toggleNSFW.onclick = () => {
	nsfw = !nsfw
	localStorage.setItem("nsfw", nsfw)

	toggleNSFW.classList.toggle("active", nsfw)
	toggleNSFW.querySelector(".material-icons").textContent = nsfw ? "visibility_off" : "visibility"

	reset()
}

function getTags() {
	let tags = search.value.trim()
	tags += " -ai -ai-generated"
	return tags.trim()
}

async function load() {
    if (isLoading) return;

    isLoading = true;
    loading.style.display = "block";

    let tags = search.value.trim() + " -ai -ai-generated";
    const url = `/api/posts?page=${page}&tags=${encodeURIComponent(tags)}&_=${Date.now()}`;

    let posts;
    try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error();
        posts = await res.json();
    } catch (e) {
        loading.textContent = "Error";
        isLoading = false;
        return;
    }

    console.log("[API]", page, "incoming posts:", posts.map(p => ({id: p.id, rating: p.rating})));

    if (!posts.length) {
        loading.textContent = "Not yet";
        isLoading = false;
        return;
    }

    posts.forEach(o => {
        if ((!nsfw && o.rating === "s") || (nsfw && o.rating !== "s")) return;
        addPostCard(o);
    });

    page++;
    isLoading = false;
    loading.style.display = "none";
}

// Infinite scroll (window scroll yöntemi)
window.addEventListener('scroll', () => {
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300 && !isLoading) {
        load();
    }
});

// Kart oluşturma fonksiyonu
function addPostCard(o) {
    const c = document.createElement("div");
    c.className = "card";

    const im = document.createElement("img");
    im.src = o.preview_url || "https://via.placeholder.com/140?text=No+Img";
    im.loading = "lazy";
    im.onclick = () => openModal(o);
    c.appendChild(im);

    const footer = document.createElement("div");
    footer.style.display = "flex";
    footer.style.alignItems = "center";
    footer.style.padding = "4px 8px";
    footer.style.gap = "8px";
    footer.style.overflow = "hidden";

    // Dosya adı container
    const fileNameWrapper = document.createElement("div");
    fileNameWrapper.style.flex = "1";
    fileNameWrapper.style.overflow = "hidden";
    fileNameWrapper.style.position = "relative";
    fileNameWrapper.style.height = "1.2em";

    const fileName = document.createElement("div");
    fileName.style.whiteSpace = "nowrap";
    fileName.style.position = "absolute";
    fileName.style.left = "0";
    fileName.style.top = "0";
    fileName.style.fontSize = "0.8rem";
    fileName.style.color = "var(--text-sec)";

    const extMatch = o.file_url.match(/\.(\w+)(\?|$)/);
    const ext = extMatch ? extMatch[1] : "jpg";
    const tagsClean = (o.tags || "").replace(/\s+/g, "_").slice(0, 50);
    const filename = `yande_${o.id}_${tagsClean}.${ext}`;
    fileName.textContent = filename;

    fileNameWrapper.appendChild(fileName);
    footer.appendChild(fileNameWrapper);

    // İndirme butonu
    const dlBtn = document.createElement("button");
    dlBtn.className = "material-icons";
    dlBtn.textContent = "download";
    dlBtn.style.border = "none";
    dlBtn.style.borderRadius = "50%";
    dlBtn.style.width = "32px";
    dlBtn.style.height = "32px";
    dlBtn.style.display = "grid";
    dlBtn.style.placeItems = "center";
    dlBtn.style.background = "var(--primary)";
    dlBtn.style.color = "#000";
    dlBtn.style.cursor = "pointer";
    dlBtn.style.flexShrink = "0";
    dlBtn.style.transition = "transform 0.2s ease";
    dlBtn.onmouseover = () => dlBtn.style.transform = "scale(1.2)";
    dlBtn.onmouseout = () => dlBtn.style.transform = "scale(1)";
    dlBtn.onclick = (e) => {
        e.stopPropagation();
        const url = `/api/view?url=${encodeURIComponent(o.file_url)}`;
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };
    footer.appendChild(dlBtn);
    c.appendChild(footer);
    grid.appendChild(c);

    setTimeout(() => c.classList.add("visible"), 80);

    // Kayan yazı animasyonu
    const startMarquee = () => {
        const wrapperWidth = fileNameWrapper.offsetWidth;
        const textWidth = fileName.offsetWidth;
        if (textWidth <= wrapperWidth) return; // sığarsa kaydırma yok

        let pos = 0;
        const speed = 0.3; // px/frame
        const step = () => {
            pos -= speed;
            if (-pos >= textWidth) {
                pos = wrapperWidth;
                setTimeout(() => requestAnimationFrame(step), 2000); // 3 saniye bekle
            } else {
                requestAnimationFrame(step);
            }
            fileName.style.transform = `translateX(${pos}px)`;
        };
        requestAnimationFrame(step);
    };

    startMarquee();
}

function reset() {
	page = 1
	grid.innerHTML = ""

	window.scrollTo({ top: 0, behavior: "instant" })
	loading.style.display = "block"

	load()
}

function openModal(p){

	const preview = p.preview_url
	const hd = p.sample_url || p.file_url

	const loader = document.getElementById("hd-loader")

	bigImg.src = preview
	bigImg.alt = "loading"

	loader.style.display = "flex"

	const proxyUrl = `/api/view?url=${encodeURIComponent(hd)}`

	hdLoaderImg = new Image()

	hdLoaderImg.onload = () => {
		bigImg.src = proxyUrl
		loader.style.display = "none"
	}

	hdLoaderImg.onerror = () => {
		loader.style.display = "none"
	}

	hdLoaderImg.src = proxyUrl

	btnDownload.onclick = () => {
		const url = `/api/view?url=${encodeURIComponent(p.file_url)}`;
		const extMatch = p.file_url.match(/\.(\w+)(\?|$)/); // dosya uzantısını alır
		const ext = extMatch ? extMatch[1] : "jpg";

		// tags'i sadece temizlemiş hâlde al, boşluk yerine _
		const tagsClean = (p.tags || "").replace(/\s+/g, "_").slice(0, 50);

		const filename = `yande_${p.id}_${tagsClean}.${ext}`;

		const a = document.createElement("a");
		a.href = url;
		a.download = filename;
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
	};

	modal.style.display = "flex"
	setTimeout(()=>modal.classList.add("show"),20)
}

function closeModal() {

	if (hdLoaderImg) {
		hdLoaderImg.src = ""
		hdLoaderImg = null
	}

	modal.classList.remove("show")

	setTimeout(() => {
		modal.style.display = "none"
		bigImg.src = ""
		document.getElementById("hd-loader").style.display = "none"
	}, 450)
}

modal.onclick = e => {
	if (e.target === modal) closeModal()
}

btnSearch.onclick = reset

search.onkeydown = e => {
	if (e.key === "Enter") {
		e.preventDefault()
		reset()
	}
}

document.getElementById("home-btn").onclick = reset

/*
// Infinite scroll
const main = document.querySelector("main");
main.addEventListener("scroll", () => {
    if (!isLoading && main.scrollTop + main.clientHeight >= main.scrollHeight - 200) {
        load();
    }
});
*/

load()
</script>

</body>
</html>
